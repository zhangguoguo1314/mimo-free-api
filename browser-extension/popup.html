<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 400px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  padding: 16px;
}
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #ff6b6b, #feca57);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.title { font-size: 16px; font-weight: 600; }
.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
}
.btn-primary {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
}
.btn-success {
  background: linear-gradient(135deg, #11998e, #38ef7d);
  color: #fff;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.status {
  padding: 10px;
  border-radius: 6px;
  font-size: 13px;
  text-align: center;
  margin-bottom: 12px;
  display: none;
}
.status.show { display: block; }
.status.ok { background: rgba(34,197,94,0.15); color: #22c55e; }
.status.err { background: rgba(239,68,68,0.15); color: #ef4444; }
.result-box {
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
  display: none;
}
.result-box.show { display: block; }
.cookie-row {
  display: flex;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.cookie-row:last-child { border-bottom: none; }
.cookie-label { width: 100px; font-size: 12px; color: #888; }
.cookie-value-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
.cookie-value {
  flex: 1;
  font-family: monospace;
  font-size: 11px;
  color: #a0aec0;
  background: rgba(0,0,0,0.3);
  padding: 6px 10px;
  border-radius: 6px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cookie-value.ok { color: #22c55e; }
.cookie-value.miss { color: #ef4444; }
.copy-btn {
  padding: 4px 10px;
  font-size: 11px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 4px;
  color: #fff;
  cursor: pointer;
}
.config-section {
  background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
  border: 1px solid rgba(102,126,234,0.3);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
  display: none;
}
.config-section.show { display: block; }
.config-title { font-size: 12px; color: #667eea; margin-bottom: 8px; font-weight: 600; }
.config-output {
  background: rgba(0,0,0,0.3);
  border-radius: 6px;
  padding: 10px;
  font-family: monospace;
  font-size: 10px;
  color: #a0aec0;
  max-height: 120px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  margin-bottom: 10px;
}
.hint { font-size: 11px; color: #666; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">🍪</div>
    <div class="title">MiMo Cookie 抓取器</div>
  </div>
  <div class="status" id="status"></div>
  <button class="btn btn-primary" id="grabBtn">🔍 抓取 Cookie</button>
  <div class="result-box" id="resultBox">
    <div class="cookie-row">
      <div class="cookie-label">service_token</div>
      <div class="cookie-value-wrap">
        <div class="cookie-value" id="serviceTokenVal">未找到</div>
        <button class="copy-btn" data-field="service_token">复制</button>
      </div>
    </div>
    <div class="cookie-row">
      <div class="cookie-label">user_id</div>
      <div class="cookie-value-wrap">
        <div class="cookie-value" id="userIdVal">未找到</div>
        <button class="copy-btn" data-field="user_id">复制</button>
      </div>
    </div>
    <div class="cookie-row">
      <div class="cookie-label">ph</div>
      <div class="cookie-value-wrap">
        <div class="cookie-value" id="phVal">未找到</div>
        <button class="copy-btn" data-field="ph">复制</button>
      </div>
    </div>
  </div>
  <div class="config-section" id="configSection">
    <div class="config-title">📋 完整配置</div>
    <div class="config-output" id="configOutput"></div>
    <button class="btn btn-success" id="copyConfigBtn">一键复制</button>
  </div>
  <div class="hint">在 MiMo 网页发送消息后点击抓取</div>
  <script src="popup.js"></script>
</body>
</html>
