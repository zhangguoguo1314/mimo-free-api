<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MiMo Cookie 抓取器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 18px;
      color: #333;
      margin-bottom: 16px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .icon {
      font-size: 24px;
    }

    .cookie-item {
      margin-bottom: 12px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 3px solid #667eea;
    }

    .cookie-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .cookie-value {
      font-size: 13px;
      color: #333;
      word-break: break-all;
      font-family: 'Consolas', monospace;
    }

    .status {
      text-align: center;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 500;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #e9ecef;
      color: #495057;
    }

    .btn-secondary:hover {
      background: #dee2e6;
    }

    .btn-success {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      color: white;
    }

    .btn-success:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4);
    }

    .capture-time {
      text-align: center;
      font-size: 11px;
      color: #888;
      margin-top: 12px;
    }

    .hint {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-top: 12px;
      padding: 10px;
      background: #fff3cd;
      border-radius: 6px;
      line-height: 1.5;
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    .btn-group .btn {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🍪</span> MiMo Cookie 抓取器</h1>

    <div id="status" class="status error">⏳ 点击"立即抓取"按钮获取Cookie</div>

    <div class="cookie-item">
      <div class="cookie-label">User ID</div>
      <div id="uid" class="cookie-value">-</div>
    </div>

    <div class="cookie-item">
      <div class="cookie-label">Service Token</div>
      <div id="token" class="cookie-value">-</div>
    </div>

    <div class="cookie-item">
      <div class="cookie-label">PH Token</div>
      <div id="ph" class="cookie-value">-</div>
    </div>

    <button id="grabBtn" class="btn btn-success">🔍 立即抓取</button>

    <div class="btn-group">
      <button id="copyBtn" class="btn btn-primary">📋 复制配置</button>
      <button id="refreshBtn" class="btn btn-secondary">🔄 刷新</button>
    </div>

    <div id="captureTime" class="capture-time">暂无数据</div>

    <div class="hint">
      💡 <strong>使用方法：</strong><br>
      1. 在 MiMo 网站发送一条消息<br>
      2. 点击"立即抓取"按钮<br>
      3. 点击"复制配置"获取JSON<br>
      4. 粘贴到项目的Web设置中
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
